<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — Project Zomboid Wiki</title>
  <meta name="description" content="The page you requested could not be found." />
  <meta name="robots" content="noindex, follow" />
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .gw404{min-height:70vh;display:flex;flex-direction:column;align-items:center;
      justify-content:center;text-align:center;padding:3rem 1.25rem;gap:.5rem}
    .gw404 .code{font-size:clamp(3.5rem,14vw,7rem);font-weight:800;line-height:1;
      letter-spacing:.04em;opacity:.85}
    .gw404 h1{font-size:clamp(1.1rem,3.5vw,1.6rem);margin:.25rem 0 .35rem}
    .gw404 p{opacity:.75;max-width:34rem;margin:0 0 1.4rem;line-height:1.6}
    .gw404 a.home{display:inline-block;padding:.7rem 1.4rem;border:2px solid currentColor;
      border-radius:6px;text-decoration:none;font-weight:700;color:inherit;
      transition:opacity .15s ease}
    .gw404 a.home:hover{opacity:.65}
  </style>
</head>
<body>
  <main class="gw404">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you requested doesn't exist or may have moved. Head back to the Project Zomboid Wiki home page to find what you're looking for.</p>
    <a class="home" href="/">Return home</a>
  </main>
</body>
</html>
